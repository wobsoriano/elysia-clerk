name: Preview

on: [push, pull_request]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Build
        run: vp pack

      - name: Create a snapshot version
        id: snapshot
        run: vp dlx pkg-pr-new publish --compact
